name: Build & Release

on:
  workflow_dispatch:

env:
  WORKING_DIR: Kiro-account-manager

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag_name: ${{ steps.get_version.outputs.tag_name }}
      changelog_en: ${{ steps.extract_changelog.outputs.changelog_en }}
      changelog_cn: ${{ steps.extract_changelog.outputs.changelog_cn }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get_version
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="v$VERSION"
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Tag: $TAG_NAME"

      - name: Extract changelog from README
        id: extract_changelog
        run: |
          CHANGELOG_EN=$(awk '/^### v[0-9]+\.[0-9]+\.[0-9]+/{if(found) exit; found=1} found' README.md)
          CHANGELOG_CN=$(awk '/^### v[0-9]+\.[0-9]+\.[0-9]+/{if(found) exit; found=1} found' README_CN.md)

          echo "changelog_en<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_EN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "changelog_cn<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG_CN" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  build-macos:
    needs: get-version
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install setuptools
        run: pip install setuptools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Build
        id: build_step
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
        continue-on-error: true

      - name: Package macOS ${{ matrix.arch }}
        working-directory: ${{ env.WORKING_DIR }}
        run: npx electron-builder --mac --${{ matrix.arch }} -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            ${{ env.WORKING_DIR }}/dist/*.dmg
            ${{ env.WORKING_DIR }}/dist/*.zip
            ${{ env.WORKING_DIR }}/dist/*.yml
            ${{ env.WORKING_DIR }}/dist/*.blockmap
          if-no-files-found: ignore

  build-linux:
    needs: get-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install setuptools
        run: pip install setuptools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: Build
        id: build_step
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
        continue-on-error: true

      - name: Package Linux ${{ matrix.arch }}
        working-directory: ${{ env.WORKING_DIR }}
        run: npx electron-builder --linux --${{ matrix.arch }} -p never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            ${{ env.WORKING_DIR }}/dist/*.AppImage
            ${{ env.WORKING_DIR }}/dist/*.deb
            ${{ env.WORKING_DIR }}/dist/*.rpm
            ${{ env.WORKING_DIR }}/dist/*.tar.gz
            ${{ env.WORKING_DIR }}/dist/*.yml
            ${{ env.WORKING_DIR }}/dist/*.blockmap
          if-no-files-found: ignore

  release:
    needs: [get-version, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts || true

      - name: Deduplicate update metadata files
        run: |
          find artifacts -name "builder-debug.yml" -delete 2>/dev/null || true
          find artifacts -name "latest-mac.yml" | head -1 | xargs -I {} cp {} artifacts/latest-mac.yml 2>/dev/null || true
          find artifacts -path "*/macos-*/*" -name "latest-mac.yml" -delete 2>/dev/null || true
          find artifacts -name "latest-linux.yml" | head -1 | xargs -I {} cp {} artifacts/latest-linux.yml 2>/dev/null || true
          find artifacts -path "*/linux-*/*" -name "latest-linux.yml" -delete 2>/dev/null || true

          echo "After deduplication:"
          find artifacts -name "*.yml" -type f || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Kiro Account Manager v${{ needs.get-version.outputs.version }}
          tag_name: ${{ needs.get-version.outputs.tag_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ## 🌟 更新内容 | What's New

            ${{ needs.get-version.outputs.changelog_cn }}

            ---

            ${{ needs.get-version.outputs.changelog_en }}
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.tar.gz
            artifacts/**/*.yml
            artifacts/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

